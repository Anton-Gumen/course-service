name: workflow.yml


on:
  push:
    branches:
      - master
    paths:
      - 'course-service'
      - '.github/workflows/workflow.yml'
      - 'docker-compose.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{github.repository_owner}}/course-service
  SERVICE_DIR: course-service
  DEPLOY_PATH: /opt/course-service

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: chekout_code
        uses: actions/checkout@v4

      - name: setup_jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: build_with_maven
        run: |
          mvn clean package -DskipTests
          mkdir -p ../dist
          cp target/*.jar ../dist/app.jar

      - name: login ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{env.REGISTRY}}
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: build_and_push_docker_image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: 'true'
          tags: ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:latest
          build-args: |
            SPRING_PROFILES_ACTIVE=prod

      - name: copy_docker_compose_to_vps
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{secrets.VPS_HOST}}
          username: ${{secrets.VPS_USER}}
          key: ${{secrets.VPS_SSH_KEY}}
          port: ${{secrets.VPS_SSH_PORT}}
          source: "docker-compose.yaml"
          target: "/opt/course-service"
          strip_components: '0'

      - name: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.VPS_HOST}}
          username: ${{secrets.VPS_USER}}
          key: ${{secrets.VPS_SSH_KEY}}
          port: ${{secrets.VPS_SSH_PORT}}
          script: |
            cd /opt/course-service
            echo "${{secrets.GITHUB_TOKEN}}" | docker login ${{env.REGISTRY}} -u ${{github.actor}} --password-stdin
            docker pull ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:latest
            docker compose down
            docker compose up -d
            sleep 10
            docker image prune -f
          
  
